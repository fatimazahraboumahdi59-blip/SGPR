<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SGPR</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.jpeg" alt="logo">
        <div>
            <h2>SGPR</h2>
            <p>Système de gestion des prix de référence</p>
        </div>
    </div>

    <nav>
        <a href="#"><i class="fa-solid fa-house"></i> Accueil</a>
    </nav>

</header>

<section class="title">
    <img src="logo.jpeg">
    <h1>SGPR</h1>
    <p>Système de gestion des prix de référence</p>
</section>

<div class="container">

<!-- ADMIN PRICE -->
<div class="admin-box">
    <input id="adminPrice" type="number" placeholder="Prix administration  (estimation) DH ">
</div>
<div>
   
<div class="options">

    <label>Nature :</label>

    <select id="nature">
        <option value="aucun">.....</option>
        <option value="travaux">Travaux</option>
        <option value="fourniture">Fourniture</option>
        <option value="service">Service</option>
    </select>

</div>

<div id="etudiantsDiv" style="display:none; margin-top:15px;">

    <label>Pourtaut sur les études:</label>

    <select id="etudiants">
        <option value="oui">Oui</option>
        <option value="non">Non</option>
    </select>

</div>
<table>
<thead>
<tr>
    <th>Entreprise</th>
    <th>Avant correction</th>
    <th>Après correction</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
    <td><input class="company" type="text" placeholder="Nom société"></td>
    <td><input class="before" type="number"></td>
    <td><input class="after" type="number" ></td>
</tr>
</tbody>
</table>

<button class="add-btn" onclick="addRow()">+ Ajouter ligne</button>

<br><br>

<button class="save" onclick="calculate()">Calculer</button>

<div id="result"></div>

</div>

<footer>
© SGPR - Système de gestion des prix de référence
</footer>


<script src="script.js"></script>

</body>
</html>
